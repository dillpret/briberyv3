<div class="p-4 max-w-md mx-auto space-y-4">

  <h1 class="text-xl font-bold">Lobby (POC)</h1>

  <!-- Player -->
  <div class="border p-3 rounded">
    <label class="block text-sm font-medium mb-1">Your Name</label>
    <input [(ngModel)]="name" class="border px-2 py-1 w-full" />
  </div>

  <!-- Create -->
  <div class="border p-3 rounded">
    <button (click)="createGame()" class="bg-blue-500 text-white px-3 py-1 rounded">
      Create Game
    </button>
  </div>

  <!-- Join -->
  <div class="border p-3 rounded space-y-2">
    <label class="block text-sm font-medium">Game Code</label>
    <input [(ngModel)]="gameId" class="border px-2 py-1 w-full" />

    <button (click)="join()" class="bg-green-500 text-white px-3 py-1 rounded">
      Join Game
    </button>
  </div>

  <!-- Lobby -->
  <div class="border p-3 rounded">
    <p class="text-sm text-gray-600 mb-2">Game ID: {{ gameId }}</p>

    <ul class="space-y-1">
      @for (player of players(); track player.id) {
        <li class="flex justify-between">
          <span>{{ player.name }}</span>
          <span class="text-xs text-gray-500">
            {{ player.connected ? 'online' : 'offline' }}
          </span>
        </li>
      }
    </ul>
  </div>

</div>
