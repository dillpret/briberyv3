<main class="phase-shell justify-center">
  <section class="text-center">
    <img
      src="/brand/bribery-logo.png"
      alt="Bribery"
      class="brand-logo mx-auto" />
  </section>

  @if (errorMessage) {
    <section class="soft-panel notice-panel text-center text-sm font-semibold text-ink">
      {{ errorMessage }}
    </section>
  }

  <section class="soft-panel space-y-4">
    <label class="block space-y-2">
        <span class="text-sm font-semibold text-ink/80">Your name</span>
      <input
        [(ngModel)]="name"
        class="soft-input"
        autocomplete="nickname"
        placeholder="Your name" />
    </label>

    <button
      (click)="createGame()"
      [disabled]="!name.trim()"
      class="primary-button">
      Create a new room
    </button>
  </section>

  <section class="soft-panel space-y-4">
    <label class="block space-y-2">
      <span class="text-sm font-semibold text-ink/80">Game code</span>
      <input
        [(ngModel)]="gameId"
        (ngModelChange)="gameId = normalizeGameId($event)"
        class="soft-input uppercase"
        autocomplete="off"
        placeholder="AB12" />
    </label>

    <button
      (click)="join()"
      [disabled]="!name.trim() || !gameId.trim()"
      class="secondary-button">
      Join room
    </button>
  </section>

  <p class="text-center text-[0.65rem] font-medium text-ink/45">
    {{ deploymentLabel }}
  </p>
</main>
