<main class="phase-shell justify-center">
  <section class="text-center">
    <h1 class="text-6xl font-black tracking-tight text-slate-900 sm:text-7xl">Bribery</h1>
  </section>

  @if (errorMessage) {
    <section class="soft-panel border-sky-200 bg-sky-50/80 text-center text-sm font-semibold text-sky-800">
      {{ errorMessage }}
    </section>
  }

  <section class="soft-panel space-y-4">
    <label class="block space-y-2">
        <span class="text-sm font-semibold text-slate-700">Your name</span>
      <input
        [(ngModel)]="name"
        class="soft-input"
        autocomplete="nickname"
        placeholder="Your real name" />
    </label>

    <button
      (click)="createGame()"
      [disabled]="!name.trim()"
      class="primary-button">
      Create a new room
    </button>
  </section>

  <section class="soft-panel space-y-4">
    <label class="block space-y-2">
      <span class="text-sm font-semibold text-slate-700">Game code</span>
      <input
        [(ngModel)]="gameId"
        (ngModelChange)="gameId = normalizeGameId($event)"
        class="soft-input uppercase"
        autocomplete="off"
        placeholder="AB12" />
    </label>

    <button
      (click)="join()"
      [disabled]="!name.trim() || !gameId.trim()"
      class="secondary-button">
      Join room
    </button>
  </section>
</main>
